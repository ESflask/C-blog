<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン — C-blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body data-theme="minimal" data-mode="light">
<!-- ▼▼ layout.csp ：ヘッダー（全ページ共通） ▼▼ -->
  <header class="header">
    <div class="header__inner">
      <a class="brand" href="index.html" aria-label="C-blog ホーム">
        <span class="brand__mark">C</span>
        <span class="brand__text">
          <span class="brand__name">C-blog</span>
          <span class="brand__tag">C++ · Drogon · SQLite</span>
        </span>
      </a>
      <div class="header-search">
        <span class="header-search__icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input class="header-search__input" type="search" placeholder="記事をキーワードで検索" />
      </div>
      <nav class="nav">
        <a class="nav-btn" href="index.html">記事一覧</a>
        <a class="nav-btn active" href="login.html">管理</a>
        <button class="mode-toggle" data-mode-toggle type="button" aria-label="ライト/ダーク切替"></button>
      </nav>
    </div>
    <div class="gold-rule"></div>
  </header>
  <!-- ▲▲ ヘッダーここまで ▲▲ -->

  <!-- ▼▼ ログイン：このページの content（= 個別 .csp） ▼▼ -->
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-ornament"></div>
      <h1 class="login-title">管理者ログイン</h1>
      <p class="login-sub">セッション認証 · 管理ページ保護（LoginFilter）</p>
      <form method="post" action="/login">
        <div class="form-row"><label class="form-label">ユーザー名</label><input class="form-input" name="username" type="text" placeholder="admin" /></div>
        <div class="form-row"><label class="form-label">パスワード</label><input class="form-input" name="password" type="password" placeholder="••••••••" /></div>
        <button class="btn-primary" type="submit">ログイン</button>
      </form>
      <p class="login-hint">demo: <a href="admin.html" style="color:var(--c-blue)">admin.html へ</a></p>
    </div>
  </div>
  <!-- ▲▲ content ここまで ▲▲ -->

  <!-- ▼▼ layout.csp ：フッター（全ページ共通） ▼▼ -->
  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="footer-brand">
        <span class="footer-mark">C</span>
        <span class="footer-copy">© 2026 C-blog</span>
      </div>
      <span class="footer-tech">Powered by <b>Drogon</b> (C++17) · <b>SQLite</b></span>
    </div>
  </footer>
  <!-- ▲▲ フッターここまで ▲▲ -->
  <script src="../static/js/app.js"></script>
</body>
</html>
